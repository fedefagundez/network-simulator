<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Red</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary)">
          <circle cx="12" cy="5" r="2"/>
          <circle cx="5" cy="19" r="2"/>
          <circle cx="19" cy="19" r="2"/>
          <line x1="12" y1="7" x2="5" y2="17"/>
          <line x1="12" y1="7" x2="19" y2="17"/>
          <line x1="7" y1="19" x2="17" y2="19"/>
        </svg>
        <span class="app-title">Simulador de red</span>
        <span class="nbadge" id="badge">8 nodos</span>
      </div>
      <div class="topbar-right">
        <button class="reset-btn" id="btn-reset">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          </svg>
          Resetear
        </button>
        <button class="send-btn" id="btn-send">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Enviar
        </button>
      </div>
    </div>

    <div class="tbgroup">
      <span class="grp-label">EDITAR</span>
      <button class="tb active" id="btn-pointer">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 3l14 9-7 1-4 7z"/>
        </svg>
        Mover
      </button>
      <button class="tb" id="btn-add">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Agregar
      </button>
      <button class="tb red" id="btn-delete">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
        Eliminar
      </button>

      <div class="grp-sep"></div>
      <span class="grp-label">ASIGNAR</span>
      <button class="tb" id="btn-source">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Emisor
      </button>
      <button class="tb" id="btn-dest">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
        </svg>
        Receptor
      </button>

      <div class="grp-sep"></div>
      <button class="tb" id="btn-toggle">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
        On/Off
      </button>

      <div class="grp-sep"></div>
      <span class="grp-label">CONEXIONES</span>
      <button class="tb" id="btn-connect">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Conectar
      </button>
      <button class="tb red" id="btn-disconnect">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Desconectar
      </button>
    </div>

    <div class="canvas-outer" id="canvas-outer">
      <canvas id="c"></canvas>
    </div>

    <div class="footer">
      <div class="statusbar" id="status">Elegí una herramienta para comenzar.</div>
      <div class="legend">
        <div class="leg">
          <span class="legdot" style="background: #5b87e0; border-color: #3a5fa8"></span>
          Activo
        </div>
        <div class="leg">
          <span class="legdot" style="background: #b0b0ac; border-color: #888"></span>
          Apagado
        </div>
        <div class="leg">
          <span class="legdot" style="background: #3db86b; border-color: #1e8a44"></span>
          TX
        </div>
        <div class="leg">
          <span class="legdot" style="background: #e05b5b; border-color: #a83333"></span>
          RX
        </div>
        <div class="leg">
          <span class="legdot" style="background: #f5a623; border-color: #b87a10"></span>
          Paquete
        </div>
      </div>
    </div>
  </div>

  <script src="sounds.js"></script>
  <script src="script.js"></script>
</body>
</html>
